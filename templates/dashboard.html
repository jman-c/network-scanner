<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Network Device Scanner</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="wrap">
    <h1>Network Device Scanner</h1>

    <div class="cards">
      <div class="card">
        <div class="label">Total</div>
        <div id="total" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Known</div>
        <div id="known" class="value">-</div>
      </div>
      <div class="card warn">
        <div class="label">Unknown</div>
        <div id="unknown" class="value">-</div>
      </div>
    </div>

    <div class="alerts">
      <div class="alerts_header">
        <h2>Alerts</h2>
        <button class="btn" id="clear_alerts_btn" type="button">Clear All</button>
      </div>
      <div id="alerts_list" class="alerts_list">No alerts yet.</div>
    </div>

    <table id="tbl">
      <thead>
        <tr>
          <th>Status</th>
          <th>Friendly Name</th>
          <th>Hostname</th>
          <th>IP</th>
          <th>MAC</th>
          <th>Vendor</th>
          <th>First Seen</th>
          <th>Last Seen</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <p class="hint">
      Unknown devices are highlighted. Update <code>config.KNOWN_DEVICES</code> to mark trusted MACs.
    </p>
  </div>

<script>
function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderDeviceStatus(d) {
  const status = (d.status || "").toLowerCase();

  if (status === "online") {
    return '<span class="pill pill_ok">ONLINE</span>';
  }
  if (status === "offline") {
    return '<span class="pill pill_warn">OFFLINE</span>';
  }

  return '<span class="pill">UNKNOWN</span>';
}

async function refreshDevices() {
  const res = await fetch("/api/devices");
  const data = await res.json();

  document.getElementById("total").textContent = data.summary.total;
  document.getElementById("known").textContent = data.summary.known;
  document.getElementById("unknown").textContent = data.summary.unknown;

  const tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";

  (data.devices || [])
    .sort((a, b) => {
      if (a.known === b.known) {
        return a.mac.localeCompare(b.mac);
      }
      return a.known ? 1 : -1;
    })
    .forEach(d => {
      const tr = document.createElement("tr");
      tr.className = d.known ? "known" : "unknown";

      tr.innerHTML = `
        <td>${renderDeviceStatus(d)}</td>
        <td>${escapeHtml(d.friendly_name || "")}</td>
        <td>${escapeHtml(d.hostname || "")}</td>
        <td>${escapeHtml(d.ip || "")}</td>
        <td><code>${escapeHtml(d.mac || "")}</code></td>
        <td>${escapeHtml(d.vendor || "")}</td>
        <td><code>${escapeHtml(d.first_seen || "")}</code></td>
        <td><code>${escapeHtml(d.last_seen || "")}</code></td>
      `;
      tbody.appendChild(tr);
    });
}

async function refreshAlerts() {
  const res = await fetch("/api/alerts");
  const data = await res.json();

  const el = document.getElementById("alerts_list");
  const alerts = data.alerts || [];

  if (alerts.length === 0) {
    el.textContent = "No alerts yet.";
    return;
  }

  el.innerHTML = alerts.slice(0, 10).map(a => {
    const title = (a.type === "new_device") ? "NEW DEVICE" : (a.type || "ALERT");
    const name = a.friendly_name || a.hostname || "";
    const known = a.known ? "KNOWN" : "UNKNOWN";

    return `
      <div class="alert_item">
        <div class="alert_title_row">
          <div class="alert_title">
            ${escapeHtml(title)}
            <span class="pill ${a.known ? "pill_ok" : "pill_warn"}">${escapeHtml(known)}</span>
          </div>
          <button class="btn btn_small alert_dismiss_btn" type="button"
                  data-id="${escapeHtml(a.id || "")}">
            Dismiss
          </button>
        </div>
        <div class="alert_body">
          <div><b>Time:</b> <code>${escapeHtml(a.time || "")}</code></div>
          <div><b>IP:</b> ${escapeHtml(a.ip || "")} &nbsp; <b>MAC:</b> <code>${escapeHtml(a.mac || "")}</code></div>
          <div><b>Vendor:</b> ${escapeHtml(a.vendor || "")} &nbsp; <b>Name:</b> ${escapeHtml(name)}</div>
        </div>
      </div>
    `;
  }).join("");
}

async function dismissAlertById(id) {
  if (!id) return;

  const url = `/api/alerts/${encodeURIComponent(id)}`;
  const res = await fetch(url, { method: "DELETE" });

  if (!res.ok) {
    const txt = await res.text();
    console.error("Dismiss failed:", res.status, txt);
  }

  await refreshAlerts();
}

async function clearAlerts() {
  const res = await fetch("/api/alerts/clear", { method: "POST" });
  if (!res.ok) {
    const txt = await res.text();
    console.error("Clear failed:", res.status, txt);
  }
  await refreshAlerts();
}

async function refreshAll() {
  await Promise.all([refreshDevices(), refreshAlerts()]);
}

document.getElementById("clear_alerts_btn").addEventListener("click", clearAlerts);

document.getElementById("alerts_list").addEventListener("click", (e) => {
  const btn = e.target.closest(".alert_dismiss_btn");
  if (!btn) return;
  dismissAlertById(btn.dataset.id);
});

refreshAll();
setInterval(refreshAll, 5000);
</script>
</body>
</html>
